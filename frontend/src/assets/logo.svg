<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <radialGradient id="badgeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <rect width="100" height="50" rx="22" fill="white" opacity="0.07"/>

  <!-- Document -->
  <rect x="20" y="16" width="42" height="54" rx="6" fill="url(#docGrad)"/>
  <path d="M50 16 L62 28 H50 Z" fill="#bae6fd"/>
  <rect x="27" y="35" width="22" height="3.5" rx="1.75" fill="#0369a1" opacity="0.35"/>
  <rect x="27" y="43" width="28" height="3.5" rx="1.75" fill="#0369a1" opacity="0.25"/>
  <rect x="27" y="51" width="16" height="3.5" rx="1.75" fill="#0369a1" opacity="0.18"/>

  <!-- AI badge glow halo -->
  <circle cx="67" cy="67" r="18" fill="url(#badgeGlow)"/>

  <!-- Badge circle -->
  <circle cx="67" cy="67" r="14" fill="#0284c7"/>
  <circle cx="67" cy="67" r="12" fill="#0ea5e9"/>

  <!-- 4-point star (sparkle) = intelligence/AI symbol -->
  <path d="M67 57.5 L68.6 64.4 L75.5 66 L68.6 67.6 L67 74.5 L65.4 67.6 L58.5 66 L65.4 64.4 Z"
        fill="white" filter="url(#sparkGlow)"/>

  <!-- Small secondary sparkle dots for neural feel -->
  <circle cx="67" cy="56" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="77" cy="66" r="1" fill="white" opacity="0.5"/>
  <circle cx="57" cy="66" r="1" fill="white" opacity="0.5"/>
</svg>
